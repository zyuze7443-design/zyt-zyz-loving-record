<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Gallery - The Archives of Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f7; font-family: 'Inter', sans-serif; }
        .nav-blur { backdrop-filter: blur(20px); background: rgba(245, 245, 247, 0.8); }
        .gallery-card { border-radius: 22px; overflow: hidden; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: zoom-in; }
        .gallery-card:hover { transform: scale(1.02); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 100; cursor: zoom-out; }
    </style>
</head>
<body class="pt-24 px-6">
    <nav class="fixed top-0 left-0 right-0 h-16 nav-blur z-50 flex items-center justify-between px-8 border-b border-gray-200/50">
        <a href="index.html" class="font-semibold text-lg">The Archives</a>
        <div class="space-x-6 text-sm font-medium">
            <a href="gallery.html" class="text-blue-600">影像馆</a>
            <a href="timeline.html" class="text-gray-500 hover:text-black transition">时光轴</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-12">
            <h1 class="text-4xl font-bold tracking-tight">我们的瞬间</h1>
            <button onclick="document.getElementById('file-input').click()" class="text-sm bg-black text-white px-5 py-2 rounded-full">添加照片</button>
            <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
        </div>

        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="modal" class="modal flex items-center justify-center p-12" onclick="this.style.display='none'">
        <img id="modal-img" src="" class="max-h-full max-w-full rounded-lg shadow-2xl">
    </div>

    <script>
        // 安全拦截
        if(sessionStorage.getItem('isAuthed') !== 'true') window.location.href = 'index.html';

        const grid = document.getElementById('gallery-grid');
        const fileInput = document.getElementById('file-input');

        // 初始化加载
        function loadPhotos() {
            const photos = JSON.parse(localStorage.getItem('us_photos') || '[]');
            grid.innerHTML = photos.map((src, index) => `
                <div class="gallery-card bg-white shadow-sm" onclick="preview('${src}')">
                    <img src="${src}" class="w-full h-72 object-cover">
                </div>
            `).join('');
        }

        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const photos = JSON.parse(localStorage.getItem('us_photos') || '[]');
                    photos.unshift(event.target.result); // 存入 Base64
                    // 注意：localStorage 有 5MB 限制。对接 Firebase 时此处应改为 API 上传
                    localStorage.setItem('us_photos', JSON.stringify(photos));
                    loadPhotos();
                };
                reader.readAsDataURL(file);
            }
        });

        function preview(src) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = src;
            modal.style.display = 'flex';
        }

        loadPhotos();
    </script>
</body>
</html>
