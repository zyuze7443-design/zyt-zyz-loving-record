<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Gallery - The Archives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f7; font-family: 'Inter', sans-serif; }
        .nav-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(245, 245, 247, 0.8); }
        .gallery-card { border-radius: 22px; overflow: hidden; transition: all 0.5s ease; cursor: zoom-in; }
        .gallery-card:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pt-32 px-6">
    <nav class="fixed top-0 left-0 right-0 h-16 nav-blur z-50 flex items-center justify-between px-8 border-b border-gray-200/50">
        <div class="flex items-center space-x-6">
            <a href="index.html" class="text-gray-500 hover:text-black transition flex items-center">
                <span class="mr-2">←</span> 首页
            </a>
            <span class="font-semibold text-lg tracking-tight">影像馆</span>
        </div>
        <div class="space-x-8 text-sm font-medium">
            <a href="gallery.html" class="text-blue-600">影像馆</a>
            <a href="timeline.html" class="text-gray-500 hover:text-black transition">时光轴</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-16">
            <h1 class="text-5xl font-bold tracking-tight">Moments.</h1>
            <button onclick="document.getElementById('file-input').click()" class="bg-[#1d1d1f] text-white px-6 py-2.5 rounded-full text-sm font-medium hover:bg-black transition shadow-lg">上传回忆</button>
            <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
        </div>
        <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 bg-white/90 z-[100] hidden items-center justify-center p-6 backdrop-blur-md" onclick="this.style.display='none'">
        <img id="modal-img" src="" class="max-h-full max-w-full rounded-2xl shadow-2xl">
    </div>

    <script>
        if(sessionStorage.getItem('isAuthed') !== 'true') window.location.href = 'index.html';
        const grid = document.getElementById('gallery-grid');
        const fileInput = document.getElementById('file-input');

        function loadPhotos() {
            const photos = JSON.parse(localStorage.getItem('us_photos') || '[]');
            grid.innerHTML = photos.map(src => `<div class="gallery-card bg-white shadow-sm" onclick="preview('${src}')"><img src="${src}" class="w-full h-80 object-cover"></div>`).join('');
        }

        fileInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const photos = JSON.parse(localStorage.getItem('us_photos') || '[]');
                    photos.unshift(ev.target.result);
                    localStorage.setItem('us_photos', JSON.stringify(photos));
                    loadPhotos();
                };
                reader.readAsDataURL(file);
            });
        });

        function preview(src) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = src;
            modal.style.display = 'flex';
        }
        loadPhotos();
    </script>
</body>
</html>
