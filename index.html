<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archives of Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f5f5f7; color: #1d1d1f; overflow-x: hidden; min-height: 100vh; }
        .password-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #d2d2d7; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .password-dot.active { background: #1d1d1f; border-color: #1d1d1f; transform: scale(1.1); }
        .hidden-section { display: none; opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .visible-section { display: block; opacity: 1; transform: translateY(0); }
        .hero-image { 
            width: 100%; height: 450px; border-radius: 30px; 
            background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=2070&auto=format&fit=crop') center/cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.4s both; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="auth-section" class="text-center p-6">
        <h1 class="text-4xl font-semibold mb-16 tracking-tight">The Archives of Us</h1>
        <div class="flex space-x-5 justify-center mb-8" id="dots-container">
            <div class="password-dot"></div><div class="password-dot"></div><div class="password-dot"></div><div class="password-dot"></div>
        </div>
        <input type="password" id="pass-input" maxlength="4" autofocus class="absolute opacity-0 pointer-events-none">
        <p class="text-gray-400 text-sm tracking-wide">请输入我们的纪念日数字</p>
    </div>

    <div id="main-content" class="hidden-section w-full max-w-5xl px-6 py-20">
        <div class="hero-image"></div>

        <div class="text-center">
            <h2 class="text-xl font-medium text-gray-500 mb-4">我们在一起已经：</h2>
            <div id="counter" class="text-6xl md:text-8xl font-bold tracking-tighter mb-16 tabular-nums">0000 Days</div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-20">
                <a href="gallery.html" class="group bg-white p-10 rounded-[32px] shadow-sm hover:shadow-xl transition-all text-left">
                    <h3 class="text-2xl font-semibold mb-2">影像馆 →</h3>
                    <p class="text-gray-400">那些被定格的瞬间，都在这里闪光。</p>
                </a>
                <a href="timeline.html" class="group bg-white p-10 rounded-[32px] shadow-sm hover:shadow-xl transition-all text-left">
                    <h3 class="text-2xl font-semibold mb-2">时光轴 →</h3>
                    <p class="text-gray-400">记录碎碎念，让爱意在文字里流淌。</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_KEY = "0314"; // 纪念日密码
        const START_DATE = "2026-03-14T00:00:00"; 
        
        const input = document.getElementById('pass-input');
        const dots = document.querySelectorAll('.password-dot');
        const dotsContainer = document.getElementById('dots-container');
        const authSection = document.getElementById('auth-section');
        const mainContent = document.getElementById('main-content');

        document.addEventListener('click', () => input.focus());

        input.addEventListener('input', (e) => {
            const val = e.target.value;
            dots.forEach((dot, i) => i < val.length ? dot.classList.add('active') : dot.classList.remove('active'));

            if (val.length === 4) {
                if (val === CORRECT_KEY) {
                    sessionStorage.setItem('isAuthed', 'true');
                    unlock();
                } else {
                    dotsContainer.classList.add('shake');
                    setTimeout(() => {
                        input.value = '';
                        dotsContainer.classList.remove('shake');
                        dots.forEach(d => d.classList.remove('active'));
                    }, 400);
                }
            }
        });

        function unlock() {
            authSection.style.transition = 'all 0.8s ease';
            authSection.style.opacity = '0';
            authSection.style.transform = 'translateY(-40px)';
            setTimeout(() => {
                authSection.style.display = 'none';
                mainContent.classList.add('visible-section');
                document.body.classList.remove('flex', 'items-center', 'justify-center');
                startCounter();
            }, 800);
        }

        function startCounter() {
            const update = () => {
                const diff = new Date() - new Date(START_DATE);
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff / 3600000) % 24);
                const m = Math.floor((diff / 60000) % 60);
                const s = Math.floor((diff / 1000) % 60);
                document.getElementById('counter').innerText = `${d}天 ${h}时 ${m}分 ${s}秒`;
            };
            setInterval(update, 1000);
            update();
        }
    </script>
</body>
</html>
