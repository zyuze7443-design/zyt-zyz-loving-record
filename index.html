<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archives of Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f5f5f7; color: #1d1d1f; overflow: hidden; }
        .apple-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.7); }
        .fade-up { animation: fadeUp 1s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .password-dot { width: 12px; height: 12px; border-radius: 50%; background: #d2d2d7; transition: all 0.3s; }
        .password-dot.active { background: #1d1d1f; transform: scale(1.2); }
        .hidden-section { display: none; opacity: 0; transform: translateY(50px); transition: all 0.8s ease; }
        .visible-section { display: flex; opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div id="auth-section" class="text-center fade-up">
        <h1 class="text-4xl font-semibold mb-12 tracking-tight">The Archives of Us</h1>
        <div class="flex space-x-4 justify-center mb-8" id="dots">
            <div class="password-dot"></div><div class="password-dot"></div><div class="password-dot"></div><div class="password-dot"></div>
        </div>
        <input type="password" id="pass-input" autofocus class="opacity-0 absolute">
        <p class="text-gray-400 text-sm">输入我们的专属纪念日数字</p>
    </div>

    <div id="main-content" class="hidden-section flex-col items-center">
        <div class="text-center">
            <h2 class="text-sm uppercase tracking-[0.2em] text-gray-500 mb-4">We have been together for</h2>
            <div id="counter" class="text-6xl md:text-8xl font-bold tracking-tighter mb-12">0000 Days</div>
            <div class="flex space-x-8">
                <a href="gallery.html" class="px-8 py-3 rounded-full bg-[#1d1d1f] text-white hover:opacity-90 transition">影像馆</a>
                <a href="timeline.html" class="px-8 py-3 rounded-full border border-[#1d1d1f] hover:bg-[#1d1d1f] hover:text-white transition">时光轴</a>
            </div>
        </div>
    </div>

    <script>
        // 配置区
        const CORRECT_KEY = "2023"; // 设置你的密钥
        const START_DATE = "2023-01-01T00:00:00"; // 设置在一起的日期
        
        const input = document.getElementById('pass-input');
        const dots = document.querySelectorAll('.password-dot');
        const authSection = document.getElementById('auth-section');
        const mainContent = document.getElementById('main-content');

        input.addEventListener('input', (e) => {
            const val = e.target.value;
            dots.forEach((dot, i) => {
                i < val.length ? dot.classList.add('active') : dot.classList.remove('active');
            });

            if (val.length === 4) {
                if (val === CORRECT_KEY) {
                    sessionStorage.setItem('isAuthed', 'true');
                    unlock();
                } else {
                    e.target.value = '';
                    dots.forEach(dot => dot.classList.remove('active'));
                    // 抖动反馈
                    authSection.classList.add('animate-bounce');
                    setTimeout(() => authSection.classList.remove('animate-bounce'), 500);
                }
            }
        });

        function unlock() {
            authSection.style.transition = 'all 0.8s ease';
            authSection.style.opacity = '0';
            authSection.style.transform = 'translateY(-20px)';
            setTimeout(() => {
                authSection.style.display = 'none';
                mainContent.classList.add('visible-section');
                startCounter();
            }, 800);
        }

        function startCounter() {
            const update = () => {
                const now = new Date();
                const start = new Date(START_DATE);
                const diff = now - start;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const mins = Math.floor((diff / 1000 / 60) % 60);
                const secs = Math.floor((diff / 1000) % 60);
                document.getElementById('counter').innerText = `${days}D ${hours}H ${mins}M ${secs}S`;
            };
            setInterval(update, 1000);
            update();
        }
    </script>
</body>
</html>
