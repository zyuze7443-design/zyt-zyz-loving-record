<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archives of Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f5f5f7; color: #1d1d1f; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .fade-up { animation: fadeUp 1s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .password-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #d2d2d7; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .password-dot.active { background: #1d1d1f; border-color: #1d1d1f; transform: scale(1.1); }
        .hidden-section { display: none; opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .visible-section { display: flex; opacity: 1; transform: translateY(0); }
        /* 错误抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .error-dot { background: #ff3b30 !important; border-color: #ff3b30 !important; }
    </style>
</head>
<body>

    <div id="auth-section" class="text-center fade-up cursor-text">
        <h1 class="text-4xl font-semibold mb-16 tracking-tight">The Archives of Us</h1>
        <div class="flex space-x-5 justify-center mb-8" id="dots-container">
            <div class="password-dot"></div><div class="password-dot"></div><div class="password-dot"></div><div class="password-dot"></div>
        </div>
        <input type="password" id="pass-input" maxlength="4" autofocus class="absolute opacity-0 pointer-events-none">
        <p class="text-gray-400 text-sm tracking-wide">请输入我们的纪念日数字</p>
    </div>

    <div id="main-content" class="hidden-section flex-col items-center">
        <div class="text-center">
            <h2 class="text-sm uppercase tracking-[0.3em] text-gray-400 mb-6">We have been together for</h2>
            <div id="counter" class="text-6xl md:text-8xl font-bold tracking-tighter mb-16 tabular-nums">0000 Days</div>
            <div class="flex space-x-10 justify-center">
                <a href="gallery.html" class="px-10 py-3 rounded-full bg-[#1d1d1f] text-white hover:bg-black transition-all shadow-lg shadow-gray-200">影像馆</a>
                <a href="timeline.html" class="px-10 py-3 rounded-full border border-[#1d1d1f] hover:bg-[#1d1d1f] hover:text-white transition-all">时光轴</a>
            </div>
        </div>
    </div>

    <script>
        // 配置区
        const CORRECT_KEY = "2023"; // 修改为你的 4 位密码
        const START_DATE = "2023-01-01T00:00:00"; // 修改为你们在一起的日期
        
        const input = document.getElementById('pass-input');
        const dots = document.querySelectorAll('.password-dot');
        const dotsContainer = document.getElementById('dots-container');
        const authSection = document.getElementById('auth-section');
        const mainContent = document.getElementById('main-content');

        // 解决无法输入的问题：点击页面任何地方都聚焦到输入框
        document.addEventListener('click', () => input.focus());

        input.addEventListener('input', (e) => {
            const val = e.target.value;
            // 更新圆点状态
            dots.forEach((dot, i) => {
                i < val.length ? dot.classList.add('active') : dot.classList.remove('active');
            });

            if (val.length === 4) {
                if (val === CORRECT_KEY) {
                    sessionStorage.setItem('isAuthed', 'true');
                    unlock();
                } else {
                    // 密码错误反馈
                    dotsContainer.classList.add('shake');
                    dots.forEach(dot => dot.classList.add('error-dot'));
                    setTimeout(() => {
                        input.value = '';
                        dotsContainer.classList.remove('shake');
                        dots.forEach(dot => {
                            dot.classList.remove('active', 'error-dot');
                        });
                    }, 500);
                }
            }
        });

        function unlock() {
            authSection.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
            authSection.style.opacity = '0';
            authSection.style.transform = 'translateY(-40px)';
            setTimeout(() => {
                authSection.style.display = 'none';
                mainContent.classList.add('visible-section');
                startCounter();
            }, 800);
        }

        function startCounter() {
            const update = () => {
                const diff = new Date() - new Date(START_DATE);
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff / 3600000) % 24);
                const m = Math.floor((diff / 60000) % 60);
                const s = Math.floor((diff / 1000) % 60);
                document.getElementById('counter').innerText = `${d}D ${h}H ${m}M ${s}S`;
            };
            setInterval(update, 1000);
            update();
        }
    </script>
</body>
</html>
