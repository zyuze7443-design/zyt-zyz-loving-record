<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Timeline - The Archives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f7; font-family: 'Inter', sans-serif; }
        .nav-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(245, 245, 247, 0.8); }
        .relief-card { 
            background: #f5f5f7; 
            border-radius: 24px; 
            box-shadow: 10px 10px 20px #e6e6e8, -10px -10px 20px #ffffff; 
            transition: all 0.4s ease;
        }
        .relief-card:hover { transform: translateY(-4px); box-shadow: 15px 15px 30px #e1e1e3, -15px -15px 30px #ffffff; }
        .timeline-line { position: absolute; left: 50%; transform: translateX(-50%); width: 1px; background: linear-gradient(to bottom, #d2d2d7 0%, transparent 100%); height: 100%; z-index: -1; }
    </style>
</head>
<body class="pt-32 px-6 pb-24">
    <nav class="fixed top-0 left-0 right-0 h-16 nav-blur z-50 flex items-center justify-between px-8 border-b border-gray-200/50">
        <a href="index.html" class="font-semibold text-lg">The Archives</a>
        <div class="space-x-8 text-sm font-medium">
            <a href="gallery.html" class="text-gray-500 hover:text-black transition">影像馆</a>
            <a href="timeline.html" class="text-blue-600">时光轴</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto relative">
        <div class="timeline-line"></div>
        
        <h1 class="text-5xl font-bold tracking-tight mb-12 text-center">Journals.</h1>

        <div class="relief-card p-8 mb-20">
            <textarea id="note-input" class="w-full bg-transparent border-none focus:ring-0 text-lg leading-relaxed resize-none" placeholder="写下此刻的想法..." rows="3"></textarea>
            <div class="flex justify-end mt-6">
                <button onclick="saveNote()" class="bg-[#1d1d1f] text-white px-8 py-2 rounded-full text-sm font-medium hover:bg-black transition">保存</button>
            </div>
        </div>

        <div id="notes-container" class="space-y-12">
            </div>
    </main>

    <script>
        if(sessionStorage.getItem('isAuthed') !== 'true') window.location.href = 'index.html';

        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem('us_notes') || '[]');
            const container = document.getElementById('notes-container');
            container.innerHTML = notes.map(note => `
                <div class="relief-card p-8 group">
                    <div class="text-[10px] uppercase tracking-widest text-gray-400 mb-4 font-semibold">${note.date}</div>
                    <p class="text-[#1d1d1f] text-lg leading-relaxed font-light">${note.content}</p>
                </div>
            `).join('');
        }

        function saveNote() {
            const input = document.getElementById('note-input');
            if(!input.value.trim()) return;

            const notes = JSON.parse(localStorage.getItem('us_notes') || '[]');
            notes.unshift({
                content: input.value,
                date: new Date().toLocaleString('zh-CN', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                id: Date.now()
            });
            localStorage.setItem('us_notes', JSON.stringify(notes));
            input.value = '';
            loadNotes();
        }

        loadNotes();
    </script>
</body>
</html>
