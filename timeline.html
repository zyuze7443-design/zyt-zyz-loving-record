<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Timeline - The Archives of Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f7; font-family: 'Inter', sans-serif; }
        .nav-blur { backdrop-filter: blur(20px); background: rgba(245, 245, 247, 0.8); }
        .relief-card { 
            background: #f5f5f7; 
            border-radius: 22px; 
            box-shadow: 8px 8px 16px #e2e2e4, -8px -8px 16px #ffffff; 
            transition: transform 0.3s ease;
        }
        .relief-card:hover { transform: translateY(-4px); }
        .timeline-line { position: absolute; left: 50%; transform: translateX(-50%); width: 1px; background: #d2d2d7; height: 100%; z-index: -1; }
    </style>
</head>
<body class="pt-24 px-6 pb-20">
    <nav class="fixed top-0 left-0 right-0 h-16 nav-blur z-50 flex items-center justify-between px-8 border-b border-gray-200/50">
        <a href="index.html" class="font-semibold text-lg">The Archives</a>
        <div class="space-x-6 text-sm font-medium">
            <a href="gallery.html" class="text-gray-500 hover:text-black transition">影像馆</a>
            <a href="timeline.html" class="text-blue-600">时光轴</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto relative">
        <div class="timeline-line"></div>
        
        <div class="relief-card p-6 mb-16">
            <textarea id="note-input" class="w-full bg-transparent border-none focus:ring-0 text-lg resize-none" placeholder="记录今天的小确幸..." rows="3"></textarea>
            <div class="flex justify-end mt-4">
                <button onclick="saveNote()" class="bg-black text-white px-6 py-2 rounded-full text-sm">发布</button>
            </div>
        </div>

        <div id="notes-container" class="space-y-12">
            </div>
    </main>

    <script>
        if(sessionStorage.getItem('isAuthed') !== 'true') window.location.href = 'index.html';

        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem('us_notes') || '[]');
            const container = document.getElementById('notes-container');
            container.innerHTML = notes.map(note => `
                <div class="relief-card p-8 relative">
                    <div class="text-xs text-gray-400 mb-2 font-mono">${note.date}</div>
                    <p class="text-[#1d1d1f] leading-relaxed">${note.content}</p>
                </div>
            `).join('');
        }

        function saveNote() {
            const input = document.getElementById('note-input');
            if(!input.value.trim()) return;

            const notes = JSON.parse(localStorage.getItem('us_notes') || '[]');
            const newNote = {
                content: input.value,
                date: new Date().toLocaleString(),
                id: Date.now()
            };

            // DB INTERFACE: 这里替换为 fetch('/api/notes', {method: 'POST', body: ...})
            notes.unshift(newNote);
            localStorage.setItem('us_notes', JSON.stringify(notes));
            
            input.value = '';
            loadNotes();
        }

        loadNotes();
    </script>
</body>
</html>
